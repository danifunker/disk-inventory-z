name: Build, sign, notarize

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  PROJECT: Disk Inventory Z.xcodeproj
  SCHEME: Disk Inventory Z
  APP_NAME: Disk Inventory Z
  CONFIGURATION: Release
  TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

jobs:
  build:
    name: Build (${{ matrix.variant }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        include:
          # Universal (arm64 + x86_64) — tracks current runner default Xcode.
          - variant: universal
            runner: macos-14
            archs: ""              # empty = Xcode default = ARCHS_STANDARD
            notarize: true
            dmg_suffix: ""
            volume_suffix: ""
          # Intel-only — pinned to the intel runner so it can keep shipping
          # while the universal job rolls forward to newer runners.
          - variant: intel
            runner: macos-26-intel
            archs: "x86_64"
            notarize: true
            dmg_suffix: "-intel"
            volume_suffix: " (Intel)"

    steps:
      - uses: actions/checkout@v6

      - name: Show active Xcode
        run: xcodebuild -version

      - name: Detect signing availability
        id: signing
        env:
          P12: ${{ secrets.BUILD_CERT_P12_BASE64 }}
        run: |
          if [ -n "$P12" ]; then
            echo "have_cert=true" >> "$GITHUB_OUTPUT"
          else
            echo "have_cert=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No BUILD_CERT_P12_BASE64 secret — building unsigned (ad-hoc)."
          fi

      # ---------- Signed path ----------
      - name: Import Developer ID certificate
        if: steps.signing.outputs.have_cert == 'true'
        env:
          CERT_P12_BASE64: ${{ secrets.BUILD_CERT_P12_BASE64 }}
          CERT_PASSWORD:   ${{ secrets.BUILD_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"

          echo "$CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" \
            -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/productbuild
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | tr -d '"')

          echo "Available signing identities:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Archive (signed)
        if: steps.signing.outputs.have_cert == 'true'
        env:
          ARCHS_OVERRIDE: ${{ matrix.archs }}
        run: |
          set -euo pipefail
          ARCH_ARGS=()
          if [ -n "$ARCHS_OVERRIDE" ]; then
            ARCH_ARGS=(ARCHS="$ARCHS_OVERRIDE" ONLY_ACTIVE_ARCH=NO)
          fi
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination 'generic/platform=macOS' \
            -archivePath "$RUNNER_TEMP/$APP_NAME.xcarchive" \
            archive \
            ${ARCH_ARGS[@]+"${ARCH_ARGS[@]}"} \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            OTHER_CODE_SIGN_FLAGS="--timestamp --options=runtime" \
            ENABLE_HARDENED_RUNTIME=YES

      - name: Export signed .app
        if: steps.signing.outputs.have_cert == 'true'
        run: |
          set -euo pipefail
          # The archive step already produced a Developer-ID-signed, hardened-runtime
          # .app inside the xcarchive. xcodebuild -exportArchive on recent Xcode
          # segfaults in the IDEDistribution path for non-store Developer ID
          # distribution, so we just copy the signed bundle out directly.
          ARCHIVED_APP="$RUNNER_TEMP/$APP_NAME.xcarchive/Products/Applications/$APP_NAME.app"
          mkdir -p "$RUNNER_TEMP/export"
          cp -R "$ARCHIVED_APP" "$RUNNER_TEMP/export/"

          # Verify the signature so a downstream failure surfaces here, not at notary.
          codesign --verify --deep --strict --verbose=2 "$RUNNER_TEMP/export/$APP_NAME.app"
          codesign -dvv "$RUNNER_TEMP/export/$APP_NAME.app" 2>&1 | grep -E "Authority|TeamIdentifier|Identifier|Signature|Runtime"

          echo "Architectures in built binary:"
          lipo -archs "$RUNNER_TEMP/export/$APP_NAME.app/Contents/MacOS/$APP_NAME"

      # ---------- Unsigned path ----------
      - name: Build (unsigned, ad-hoc)
        if: steps.signing.outputs.have_cert == 'false'
        env:
          ARCHS_OVERRIDE: ${{ matrix.archs }}
        run: |
          set -euo pipefail
          ARCH_ARGS=()
          if [ -n "$ARCHS_OVERRIDE" ]; then
            ARCH_ARGS=(ARCHS="$ARCHS_OVERRIDE" ONLY_ACTIVE_ARCH=NO)
          fi
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination 'generic/platform=macOS' \
            -derivedDataPath "$RUNNER_TEMP/dd" \
            build \
            ${ARCH_ARGS[@]+"${ARCH_ARGS[@]}"} \
            CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO CODE_SIGN_IDENTITY=""
          mkdir -p "$RUNNER_TEMP/export"
          cp -R "$RUNNER_TEMP/dd/Build/Products/$CONFIGURATION/$APP_NAME.app" "$RUNNER_TEMP/export/"

      # ---------- Notarization ----------
      - name: Notarize and staple
        if: matrix.notarize && steps.signing.outputs.have_cert == 'true' && env.APPLE_ID != ''
        env:
          APPLE_ID:           ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          set -euo pipefail
          APP_PATH="$RUNNER_TEMP/export/$APP_NAME.app"
          ZIP_PATH="$RUNNER_TEMP/$APP_NAME-notarize.zip"

          # Notary service needs a flat archive (zip or dmg), not the .app directory directly
          /usr/bin/ditto -c -k --keepParent "$APP_PATH" "$ZIP_PATH"

          xcrun notarytool submit "$ZIP_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id  "$TEAM_ID" \
            --wait

          xcrun stapler staple "$APP_PATH"
          xcrun stapler validate "$APP_PATH"

      # ---------- DMG ----------
      - name: Build DMG
        env:
          DMG_SUFFIX:    ${{ matrix.dmg_suffix }}
          VOLUME_SUFFIX: ${{ matrix.volume_suffix }}
        run: |
          set -euo pipefail
          APP_PATH="$RUNNER_TEMP/export/$APP_NAME.app"
          STAGE="$RUNNER_TEMP/dmg-stage"
          mkdir -p "$STAGE"
          cp -R "$APP_PATH" "$STAGE/"
          ln -s /Applications "$STAGE/Applications"

          VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$APP_PATH/Contents/Info.plist")
          DMG_NAME="$APP_NAME-$VERSION$DMG_SUFFIX.dmg"
          DMG_PATH="$RUNNER_TEMP/$DMG_NAME"

          hdiutil create -volname "$APP_NAME$VOLUME_SUFFIX" \
            -srcfolder "$STAGE" \
            -ov -format UDZO "$DMG_PATH"

          # Sign + staple the DMG too (when we have a cert, and notarization is enabled)
          if [ "${{ steps.signing.outputs.have_cert }}" = "true" ]; then
            codesign --force --sign "Developer ID Application" --timestamp "$DMG_PATH"
            if [ "${{ matrix.notarize }}" = "true" ]; then
              xcrun notarytool submit "$DMG_PATH" \
                --apple-id "${{ secrets.APPLE_ID }}" \
                --password "${{ secrets.APPLE_APP_PASSWORD }}" \
                --team-id  "$TEAM_ID" \
                --wait
              xcrun stapler staple "$DMG_PATH"
            fi
          fi

          echo "DMG_PATH=$DMG_PATH" >> "$GITHUB_ENV"
          echo "DMG_NAME=$DMG_NAME" >> "$GITHUB_ENV"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.DMG_NAME }}
          path: ${{ env.DMG_PATH }}
          if-no-files-found: error

      - name: Attach DMG to GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ env.DMG_PATH }}
          generate_release_notes: true
